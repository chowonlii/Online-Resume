elopment Aid: Japan is one of the largest providers of Official Development Assistance (ODA), helping fund infrastructure and education in developing nations. It plays a vital role in the United Nations, World Bank, and G7, promoting peaceful diplomacy and international cooperation. Through the Japan International Cooperation Agency (JICA), it supports capacity-building in Asia, Africa, and Latin America."

ing those with the U.S., China, and the European Union. The country’s free-market economy attracts foreign investment, further embedding it in global trade and finance systems. <br>- Higher Education and Research: South Korea has a world-class education system, with a high emphasis on technological innovation and scientific research. Korean universities and research institutes are at the forefront of global breakthroughs in various fields. South Korean students and researchers contribute significantly to global knowledge-sharing, collaborating with international institutions on technological and scientific advancements."

e Commonwealth of Nations, and the G20, Australia helps shape global governance and policy. The country maintains strong bilateral relationships with major powers like the United States, China, Japan, and India, and it often acts as a mediator in regional disputes. Australia’s participation in peacekeeping and humanitarian efforts further enhances its international influence. <br>- Environmental Stewardship: Australia is at the forefront of global efforts to address climate change, with significant investments in renewable energy sources such as solar and wind power. The nation’s Great Barrier Reef is a major global environmental asset, and its conservation has widespread international significance. Australia’s commitment to preserving its unique ecosystems and biodiversity aligns with global sustainability initiatives and positions it as a leader in environmental stewardship. <br>- Trade and Investment: Australia is an open, export-driven economy, with a strong emphasis on free trade. Its strategic location in the Asia-Pacific region makes it an essential trading partner, particularly with countries like China, Japan, and the United States. Foreign investment, particularly in mining, real estate, and technology, plays a vital role in Australia’s economic growth. Australia’s stable regulatory environment and skilled workforce make it an attractive destination for international business."

h numerous start-ups gaining international recognition. The country is also known for its research in environmental science, medical advancements, and agriculture, particularly in relation to its commitment to sustainability and ecological balance. <br>- Diplomatic Influence: New Zealand has a strong reputation in international diplomacy, particularly in its peacekeeping efforts and commitment to human rights. The country is a strong advocate for global disarmament and climate action, having played a key role in establishing the Nuclear-Free Zone in the South Pacific. As a member of the United Nations, the Commonwealth of Nations, and regional organizations like the Pacific Islands Forum, New Zealand contributes to global discussions on governance, international security, and human rights. <br>- Tourism and Global Ties: New Zealand is one of the world’s most popular travel destinations, attracting millions of international tourists each year. Its tourism industry plays a critical role in connecting the country to global markets and promoting its image as an eco-tourism destination. The country’s natural beauty, adventure tourism, and cultural attractions have solidified its place on the world stage, strengthening its international ties and fostering global cultural exchange. <br>- Trade and Investment: New Zealand is a free-market economy, heavily dependent on exports, with significant trade relationships with China, Australia, the United States, and Europe. Its strong agricultural exports and focus on high-value products, such as wine, dairy, and timber, integrate it into global trade networks. The country’s policies promote innovation, entrepreneurship, and foreign investment, making it an attractive destination for global businesses and investment projects, particularly in tech and sustainability sectors."

    // Function to display info
    function showInfo(name) {
    const data = countryData[name];
    if (data) {
       document.getElementById('info').innerHTML = `
    <div id="info-box">
        <h2>${name}</h2>
        <p><strong>🌐 Description:</strong> ${data.description}</p>
        <p><strong>🌍 Impact:</strong> ${data.impact}</p>
    </div>
`;

    } else {
        document.getElementById('info').innerHTML = `
            <h2>${name}</h2>
            <p>Globalization data not available yet. Stay tuned!</p>
        `;
    }
}


    // Add countries to map with hover effects
    L.geoJSON(countries, {
        onEachFeature: function (feature, layer) {
    layer.on('click', function () {
        showInfo(feature.properties.name);
        layer.setStyle({
            color: "#800080",        // purple border
            fillColor: "#c09ac8",    // fill
            weight: 3,
            fillOpacity: 0.4
        });
    });

            layer.on('mouseover', function() {
                layer.setStyle({ color: "#a05fa0", weight: 3, fillOpacity: 0.4 });

            });
            layer.on('mouseout', function() {
                layer.setStyle({ color: "#a05fa0", weight: 2, fillOpacity: 0.2 });
            });
            layer.bindTooltip(feature.properties.name, {permanent: false, direction: "center"});
        },
        style: {
    color: "#800080",           // Purple border
    fillColor: "#c09ac8",       // Softer purple fill
    weight: 2,
    fillOpacity: 0.3
}
